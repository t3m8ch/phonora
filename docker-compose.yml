services:
  postgres:
    image: postgres:16-alpine
    container_name: phonora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phonora}
      POSTGRES_USER: ${POSTGRES_USER:-phonora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phonora}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phonora} -d ${POSTGRES_DB:-phonora}"]
      interval: 10s
      timeout: 5s
      retries: 10

  directus:
    image: directus/directus:11.8.0
    container_name: phonora-directus
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8055:8055"
    environment:
      KEY: ${KEY:-replace-me-with-a-long-random-string}
      SECRET: ${SECRET:-replace-me-with-another-long-random-string}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-phonora}
      DB_USER: ${POSTGRES_USER:-phonora}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-phonora}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-directus}
      PUBLIC_URL: http://localhost:8055
      CORS_ENABLED: "true"
      CORS_ORIGIN: http://localhost:3000
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_ROOT: /directus/uploads
    volumes:
      - directus_uploads:/directus/uploads

  web:
    image: oven/bun:1.3.11
    container_name: phonora-web
    working_dir: /workspace
    depends_on:
      - directus
    ports:
      - "3000:3000"
    environment:
      DIRECTUS_URL: ${DIRECTUS_URL:-http://directus:8055}
      DIRECTUS_ASSETS_BASE_URL: ${DIRECTUS_ASSETS_BASE_URL:-http://localhost:8055/assets}
      DIRECTUS_PUBLIC_STATUS: ${DIRECTUS_PUBLIC_STATUS:-published}
      DIRECTUS_PUBLIC_VISIBILITY: ${DIRECTUS_PUBLIC_VISIBILITY:-visible}
      PHONORA_COURSE_SLUG: ${PHONORA_COURSE_SLUG:-phonora-mvp}
    volumes:
      - .:/workspace
    command: >-
      sh -lc "bun install && bun --cwd apps/web run dev --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
  directus_uploads:
